workflows:
  ios-build:
    name: iOS Build
    instance_type: mac_mini_m2
    environment:
      flutter: stable
    scripts:
      - name: Clean
        script: |
          flutter clean
          rm -rf ios/Pods
          rm -rf ios/Podfile.lock
      - name: Get packages
        script: flutter pub get
      - name: Install pods
        script: |
          cd ios
          pod install --repo-update
      - name: Build
        script: flutter build ios --release --no-codesign --verbose
    artifacts:
      - build/ios/iphoneos/Runner.app